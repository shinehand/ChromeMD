<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChromeMD 설정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #24292f;
      background: #f6f8fa;
      margin: 0;
      padding: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 24px;
      color: #1f2328;
    }
    .card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px 20px;
      max-width: 560px;
    }
    .card + .card {
      margin-top: 16px;
    }
    .option-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
    }
    .option-row + .option-row {
      border-top: 1px solid #eaeef2;
    }
    .option-row input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #0969da;
    }
    .option-label {
      flex: 1;
      cursor: pointer;
    }
    .option-label strong {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .option-label span {
      color: #57606a;
      font-size: 12px;
      line-height: 1.5;
    }
    #status {
      margin-top: 16px;
      font-size: 12px;
      color: #57606a;
      min-height: 18px;
    }
    #status.saved {
      color: #1a7f37;
    }
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
    }
    .meta-row + .meta-row {
      border-top: 1px solid #eaeef2;
    }
    .meta-label {
      color: #57606a;
      font-size: 12px;
      min-width: 88px;
    }
    .meta-value {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #1f2328;
      word-break: break-all;
    }
    .helper-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn {
      appearance: none;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      color: #24292f;
      font-size: 12px;
      line-height: 1;
      padding: 8px 10px;
      cursor: pointer;
    }
    .btn:hover {
      background: #eef2f6;
    }
    .helper-note {
      margin-top: 12px;
      color: #57606a;
      font-size: 12px;
      line-height: 1.6;
    }
    code.inline {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #f6f8fa;
      border: 1px solid #eaeef2;
      border-radius: 4px;
      padding: 2px 4px;
    }
  </style>
</head>
<body>
  <h1>ChromeMD 설정</h1>
  <div class="card">
    <div class="option-row">
      <input type="checkbox" id="autoPopup" />
      <label class="option-label" for="autoPopup">
        <strong>md 파일을 새 팝업 창으로 자동 열기</strong>
        <span>
          로컬 md 파일을 더블 클릭하거나 Chrome에서 열면,
          기존 Chrome 창과 독립된 별도 팝업 창에서 표시합니다.
        </span>
      </label>
    </div>
  </div>
  <div class="card">
    <h2 style="font-size:16px; margin:0 0 12px;">네이티브 바로 저장</h2>
    <div class="meta-row">
      <div class="meta-label">확장 ID</div>
      <div class="meta-value" id="extensionId"></div>
    </div>
    <div class="meta-row">
      <div class="meta-label">헬퍼 상태</div>
      <div class="meta-value" id="nativeStatus">확인 중…</div>
    </div>
    <div class="helper-actions">
      <button id="btnCheckNative" class="btn" type="button">상태 다시 확인</button>
    </div>
    <div class="helper-note">
      macOS에서 현재 파일을 선택 창 없이 바로 저장하려면 네이티브 호스트를 설치해야 합니다.<br />
      저장소 루트에서 <code class="inline">./native_host/install_native_host.sh &lt;확장ID&gt;</code> 를 실행하세요.
    </div>
  </div>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
